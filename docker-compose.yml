# Full stack: Postgres + pgvector for semantic search, and the Streamlit app.
#
#   cp .env.example .env    # then fill in OPENAI_API_KEY
#   docker compose up --build
#
# First start embeds the knowledge base into Postgres (a few minutes). The database lives in
# a named volume, so later starts skip that and come up immediately.

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpass}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bound to localhost only. Exposed so host-side tooling — notably the evaluation
      # harness, which isn't shipped in the app image — can query the same index the app uses.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      # The app's index build is expensive; only start it once Postgres really accepts
      # connections, hence depends_on: service_healthy below.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Setting this is what switches retrieve.py from the local SQLite vector index to
      # pgvector — see rag/retrieve.py.
      PGVECTOR_URL: postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-ragpass}@db:5432/${POSTGRES_DB:-rag}
      FEEDBACK_DB_PATH: /app/state/feedback.db
    env_file:
      # Supplies OPENAI_API_KEY (and optionally OPENAI_MODEL). Never baked into the image.
      - .env
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      # Only mutable state is mounted. Do NOT mount /app/data: that holds the shipped
      # knowledge base from the image, and a named volume would pin the copy captured when
      # the volume was first created — so an updated documents.jsonl would never take effect.
      - appstate:/app/state
    restart: unless-stopped

volumes:
  pgdata:
  appstate:
